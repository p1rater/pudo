# /etc/pudo/pudo.conf
# pudo — Privilege User DO  —  Main Configuration
# Permissions: root:root 600
#   sudo install -m 600 -o root -g root pudo.conf /etc/pudo/pudo.conf
# ─────────────────────────────────────────────────────────────────────────────

# Session token TTL in seconds.
# After a successful password entry, pudo will not prompt again
# for this many seconds on the same tty.
token_timeout = 300

# Delay added after each failed password attempt (seconds).
# Doubles on each retry: 0.5s, 1.0s, 1.5s
auth_delay = 0.5

# Maximum password attempts before locking out.
max_retries = 3

# Audit log path.
audit_log = /var/log/pudo.log

# Environment policy:
#   strict   — only HOME/USER/SHELL/PATH/TERM/LANG pass through
#   moderate — strips LD_*, PYTHON*, PERL5*, etc. — rest passes
#   off      — no stripping (NOT RECOMMENDED)
env_policy = strict

# Blacklisted commands — never executed regardless of rules.
# Comma-separated absolute paths.
# blacklist = /bin/rm, /usr/bin/dd

# Preferred editor for 'pudo -e' (pudo edit).
# Overridden by $VISUAL or $EDITOR environment variables.
# editor = nano
